<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Registration Form</title>
<link rel="stylesheet" href = "adminReg.css">
</head>
<body>
<div class = "regis">
        
        <fieldset>
        <h1>Admin Registration</h1>
        <form action="reg">
        
        <label for="un">Admin Username</label>
        <input type="text" placeholder="Username" name = "user" id="un">
        
        <label for="pwd">Admin password</label>
        <input type="password" placeholder="Password" name = "pass" id="pwd">
        
         <label for="fn">First name</label>
        <input type="text" placeholder="First Name" name = "fname" id="fn">
        
         <label for="ln">Last name</label>
        <input type="text" placeholder="Last Name" name = "lname" id="ln">
        
         <label for="ml">Mail Id</label>
        <input type="text" placeholder="Mail id" name = "mail" id="ml">
        
         <label for="un">Phone number</label>
        <input type="text" placeholder="Phone number" name = "phone" id="phon">
        
        
        <button>Submit</button>
        
        </form>
        
        </fieldset>
        </div>
</body>
</html>
